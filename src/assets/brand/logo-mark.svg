<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <style>
      .mark-forest { fill: #1B4332; }
      .mark-navy { fill: #1B263B; }
      .mark-gold { fill: #C9972F; }
      .mark-pine { fill: #2D6A4F; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" class="mark-navy"/>
  <circle cx="40" cy="40" r="36" fill="none" stroke="#C9972F" stroke-width="1.2"/>

  <!-- Mountain silhouette -->
  <polygon points="12,55 28,25 44,55" class="mark-forest"/>
  <polygon points="30,55 48,20 66,55" class="mark-pine" opacity="0.9"/>
  <!-- Snow highlight -->
  <polygon points="45,26 48,20 51,26 49,24.5 48,27 47,24.5" fill="#D8F3DC" opacity="0.5"/>

  <!-- Trees at base -->
  <polygon points="14,55 17,46 20,55" class="mark-pine" opacity="0.7"/>
  <polygon points="20,55 23.5,44 27,55" class="mark-forest" opacity="0.8"/>
  <polygon points="55,55 58,46 61,55" class="mark-pine" opacity="0.7"/>
  <polygon points="60,55 63.5,44 67,55" class="mark-forest" opacity="0.8"/>

  <!-- Ground -->
  <rect x="10" y="55" width="60" height="1.5" rx="0.75" class="mark-forest"/>

  <!-- Compass points -->
  <polygon points="40,5 38.5,9 41.5,9" class="mark-gold"/>
  <polygon points="40,75 38.5,71 41.5,71" class="mark-gold"/>
  <polygon points="5,40 9,38.5 9,41.5" class="mark-gold"/>
  <polygon points="75,40 71,38.5 71,41.5" class="mark-gold"/>

  <!-- Inner badge for 42 -->
  <circle cx="40" cy="46" r="13" class="mark-navy"/>
  <circle cx="40" cy="46" r="11.5" fill="none" stroke="#C9972F" stroke-width="0.8"/>

  <!-- 42 number -->
  <text x="40" y="51" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="14" class="mark-gold">42</text>

  <!-- Mini fleur-de-lis above number -->
  <g transform="translate(40,37) scale(0.25)">
    <path d="M0,-10 C0,-10 -3,-4 -3,-1 C-3,1 -1.5,2.5 0,3 C1.5,2.5 3,1 3,-1 C3,-4 0,-10 0,-10Z" class="mark-gold"/>
    <path d="M-5.5,-6 C-5.5,-6 -7,-3 -6.5,-1 C-6.2,0.5 -5,1 -4,0.5 C-3.7,-0.3 -4.2,-2.3 -5.5,-6Z" class="mark-gold"/>
    <path d="M5.5,-6 C5.5,-6 7,-3 6.5,-1 C6.2,0.5 5,1 4,0.5 C3.7,-0.3 4.2,-2.3 5.5,-6Z" class="mark-gold"/>
  </g>
</svg>
