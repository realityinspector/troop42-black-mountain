<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Compass rose / fleur-de-lis hybrid -->
  <defs>
    <style>
      .forest { fill: #1B4332; }
      .gold { fill: #C9972F; }
    </style>
  </defs>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="15" class="forest"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#C9972F" stroke-width="0.8"/>
  <!-- Compass cardinal points (small triangles) -->
  <polygon points="16,2.5 14.5,6.5 17.5,6.5" class="gold"/>
  <polygon points="16,29.5 14.5,25.5 17.5,25.5" class="gold"/>
  <polygon points="2.5,16 6.5,14.5 6.5,17.5" class="gold"/>
  <polygon points="29.5,16 25.5,14.5 25.5,17.5" class="gold"/>
  <!-- Fleur-de-lis center -->
  <!-- Center petal -->
  <path d="M16,7 C16,7 14,10 14,12.5 C14,14 14.8,15 16,15.5 C17.2,15 18,14 18,12.5 C18,10 16,7 16,7Z" class="gold"/>
  <!-- Left petal -->
  <path d="M12,11 C12,11 10.5,13.5 11,15.5 C11.3,17 12.5,17.5 13.5,17 C13.8,15.8 13.2,14.2 12,11Z" class="gold"/>
  <!-- Right petal -->
  <path d="M20,11 C20,11 21.5,13.5 21,15.5 C20.7,17 19.5,17.5 18.5,17 C18.2,15.8 18.8,14.2 20,11Z" class="gold"/>
  <!-- Stem -->
  <rect x="15.2" y="15" width="1.6" height="7" rx="0.5" class="gold"/>
  <!-- Cross bar -->
  <rect x="13" y="17.5" width="6" height="1.2" rx="0.4" class="gold"/>
  <!-- Base fleur scrolls -->
  <path d="M13,22 C12,22 11.5,21 12,20" fill="none" stroke="#C9972F" stroke-width="1" stroke-linecap="round"/>
  <path d="M19,22 C20,22 20.5,21 20,20" fill="none" stroke="#C9972F" stroke-width="1" stroke-linecap="round"/>
</svg>
